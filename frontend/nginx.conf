server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so upstream names are resolved at request time,
    # not at nginx startup. Without this, nginx crashes with
    # "host not found in upstream" if the api service isn't up yet, and never
    # restarts even after it becomes available.
    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;

    # Proxy API requests to the backend service
    location /api/ {
        set $upstream_api "api:3001";
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Socket.IO (WebSocket + polling) to the backend service
    location /socket.io/ {
        set $upstream_socket "api:3001";
        proxy_pass http://$upstream_socket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
