<!DOCTYPE html>
<html>
<head>
  <title>OneDrive - Connecting...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f14;
      color: #a0a0b0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #34d399; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <p id="message">Connecting to OneDrive...</p>
  </div>
  <script>
    // This page is the OAuth redirect target.
    // It captures the auth code from the URL and sends it back to the parent window.
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const errorDesc = params.get('error_description');

    if (error) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('message').className = 'error';
      document.getElementById('message').textContent = `Error: ${errorDesc || error}`;
    } else if (code) {
      // Send code to opener via postMessage
      if (window.opener) {
        window.opener.postMessage({ type: 'onedrive-oauth-callback', code }, '*');
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('message').className = 'success';
        document.getElementById('message').textContent = 'Connected! This window will close...';
        setTimeout(() => window.close(), 1500);
      } else {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('message').textContent = 'Authorization successful. You can close this window.';
      }
    } else {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('message').className = 'error';
      document.getElementById('message').textContent = 'No authorization code received.';
    }
  </script>
</body>
</html>
