version: '3.8'

services:
  api:
    build: ./api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    volumes:
      - agent-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - app-network

  coder-service-1:
    build: ./coder-service
    ports:
      - "8111:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CODER_INSTANCE_ID=1
    networks:
      - app-network

  coder-service-2:
    build: ./coder-service
    ports:
      - "8112:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CODER_INSTANCE_ID=2
    networks:
      - app-network

  coder-service-3:
    build: ./coder-service
    ports:
      - "8113:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CODER_INSTANCE_ID=3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  agent-data: