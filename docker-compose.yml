services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=swarm_prod
      - POSTGRES_USER=swarm_prod_app
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pulsarteam}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarm_prod_app -d swarm_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: production
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-swarm2026}
      - DATABASE_URL=postgresql://swarm_prod_app:${POSTGRES_PASSWORD:-pulsarteam}@postgres:5432/swarm_prod
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost}
      - CODER_API_KEY=${CODER_API_KEY:-change-me-in-production}
      - GIT_USER_NAME=${GIT_USER_NAME:-PulsarTeam}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-agent@pulsarteam.local}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_USER=${GITHUB_USER:-}
      - SANDBOX_SERVICE_URL=http://sandbox-service:8000
      - CLAUDECODE_SERVICE_URL=http://claudecode-service:8000
      - OPENCLAW_SERVICE_URL=http://openclaw-service:8000
      - HERMES_SERVICE_URL=http://hermes-service:8000
      - OPENCODE_SERVICE_URL=http://opencode-service:8000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - ONEDRIVE_CLIENT_ID=${ONEDRIVE_CLIENT_ID:-}
      - ONEDRIVE_CLIENT_SECRET=${ONEDRIVE_CLIENT_SECRET:-}
      - ONEDRIVE_REDIRECT_URI=${ONEDRIVE_REDIRECT_URI:-}
      - ONEDRIVE_TENANT_ID=${ONEDRIVE_TENANT_ID:-}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID:-}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET:-}
      - GMAIL_REDIRECT_URI=${GMAIL_REDIRECT_URI:-}
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID:-}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET:-}
      - SLACK_REDIRECT_URI=${SLACK_REDIRECT_URI:-}
      - JIRA_BOARD_URL=${JIRA_BOARD_URL:-}
      - JIRA_ORG_ID=${JIRA_ORG_ID:-}
      - JIRA_API_KEY=${JIRA_API_KEY:-}
      - JIRA_USER_EMAIL=${JIRA_USER_EMAIL:-}
      - JIRA_WEBHOOK_URL=${JIRA_WEBHOOK_URL:-}
      - JIRA_WEBHOOK_SECRET=${JIRA_WEBHOOK_SECRET:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SSH_KEYS_HOST_PATH:-/tmp/empty-ssh}:/root/.ssh:ro
    ports:
      - "3001:3001"
    networks:
      - internal
      - sandbox-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    networks:
      - internal
    depends_on:
      - api
    restart: unless-stopped

  # ─── Runner services ─────────────────────────────────────────────────────
  # Single image (runner-service/Dockerfile), different RUNNER_TYPE per deployment.
  # Replaces the previous standalone "sandbox" container — the sandbox runner
  # is now just another mode of the runner-service (no LLM, exec/file ops only).

  claudecode-service:
    build:
      context: .
      dockerfile: runner-service/Dockerfile
    environment:
      - RUNNER_TYPE=claude-code
      - TZ=${TZ:-Europe/Paris}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - RUNNER_MODEL=${CLAUDE_MODEL:-claude-opus-4-6}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-opus-4-6}
      - RUNNER_MAX_TURNS=${CLAUDE_MAX_TURNS:-50}
      - CLAUDE_MAX_TURNS=${CLAUDE_MAX_TURNS:-50}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://api:3001
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
      - PYTHONUNBUFFERED=1
      - PYTHONFAULTHANDLER=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SSH_KEYS_HOST_PATH:-/tmp/empty-ssh}:/root/.ssh:ro
      - ${HOST_CODE_PATH:-~}:/projects
      - claudecode-auth-data:/app/data
    ports:
      - "8000:8000"
    networks:
      - sandbox-net
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  openclaw-service:
    build:
      context: .
      dockerfile: runner-service/Dockerfile
    environment:
      - RUNNER_TYPE=openclaw
      - TZ=${TZ:-Europe/Paris}
      - RUNNER_MODEL=${OPENCLAW_MODEL:-claude-opus-4-6}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://api:3001
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
      - PYTHONUNBUFFERED=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SSH_KEYS_HOST_PATH:-/tmp/empty-ssh}:/root/.ssh:ro
      - ${HOST_CODE_PATH:-~}:/projects
      - openclaw-data:/app/data
    networks:
      - sandbox-net
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  sandbox-service:
    build:
      context: .
      dockerfile: runner-service/Dockerfile
    environment:
      - RUNNER_TYPE=sandbox
      - TZ=${TZ:-Europe/Paris}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - PYTHONUNBUFFERED=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SSH_KEYS_HOST_PATH:-/tmp/empty-ssh}:/root/.ssh:ro
      - ${HOST_CODE_PATH:-~}:/projects
      - sandbox-data:/app/data
    networks:
      - sandbox-net
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  mock-service:
    build:
      context: .
      dockerfile: runner-service/Dockerfile
    environment:
      - RUNNER_TYPE=mock
      - TZ=${TZ:-Europe/Paris}
      - RUNNER_MODEL=mock-llm-1
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - MOCK_DELAY_MS=${MOCK_DELAY_MS:-50}
      - MOCK_FAIL_ON=${MOCK_FAIL_ON:-}
      - MOCK_TIMEOUT_ON=${MOCK_TIMEOUT_ON:-}
      - PYTHONUNBUFFERED=1
    volumes:
      - ${HOST_CODE_PATH:-~}:/projects
      - mock-data:/app/data
    ports:
      - "8010:8000"
    networks:
      - sandbox-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  hermes-service:
    build:
      context: .
      dockerfile: runner-service/Dockerfile
    environment:
      - RUNNER_TYPE=hermes
      - TZ=${TZ:-Europe/Paris}
      - RUNNER_MODEL=${HERMES_MODEL:-claude-opus-4-6}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://api:3001
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
      - PYTHONUNBUFFERED=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SSH_KEYS_HOST_PATH:-/tmp/empty-ssh}:/root/.ssh:ro
      - ${HOST_CODE_PATH:-~}:/projects
      - hermes-data:/app/data
    networks:
      - sandbox-net
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

volumes:
  pgdata:
  claudecode-auth-data:
  sandbox-data:
  openclaw-data:
  hermes-data:
  mock-data:

networks:
  internal:
  sandbox-net:
