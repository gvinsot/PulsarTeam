services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=swarm_prod
      - POSTGRES_USER=swarm_prod_app
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pulsarteam}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarm_prod_app -d swarm_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: production
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-swarm2026}
      - DATABASE_CONNECTION_STRING=postgresql://swarm_prod_app:${POSTGRES_PASSWORD:-pulsarteam}@postgres:5432/swarm_prod
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost}
      - CODER_API_KEY=${CODER_API_KEY:-change-me-in-production}
      - GIT_USER_NAME=${GIT_USER_NAME:-PulsarTeam}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-agent@pulsarteam.local}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_USER=${GITHUB_USER:-}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID:-}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET:-}
      - SANDBOX_SERVICE_URL=http://sandbox-service:8000
      - CLAUDECODE_SERVICE_URL=http://claudecode-service:8000
      - OPENCLAW_SERVICE_URL=http://openclaw-service:8000
      - HERMES_SERVICE_URL=http://hermes-service:8000
      - OPENCODE_SERVICE_URL=http://opencode-service:8000
      - AIDER_SERVICE_URL=http://aider-service:8000
      - CODEX_SERVICE_URL=http://codex-service:8000
      - BROWSER_SERVICE_URL=http://mcp-browser:8000
      - MCP_ENDPOINT=${MCP_ENDPOINT:-}
      - MCP_ACTIONS_ENDPOINT=${MCP_ACTIONS_ENDPOINT:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      # Google OAuth — one client serves login + Gmail + Drive plugins. The
      # redirect_uri is derived from each request (req.protocol + host + a
      # fixed path), so no URI env var is needed.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # Microsoft OAuth — one Azure App registration serves login + every
      # Microsoft Graph plugin (OneDrive, Outlook, …). Same auto-derived URI
      # scheme as Google.
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID:-}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET:-}
      - SLACK_REDIRECT_URI=${SLACK_REDIRECT_URI:-}
      - JIRA_BOARD_URL=${JIRA_BOARD_URL:-}
      - JIRA_ORG_ID=${JIRA_ORG_ID:-}
      - JIRA_API_KEY=${JIRA_API_KEY:-}
      - JIRA_USER_EMAIL=${JIRA_USER_EMAIL:-}
      - JIRA_WEBHOOK_URL=${JIRA_WEBHOOK_URL:-}
      - JIRA_WEBHOOK_SECRET=${JIRA_WEBHOOK_SECRET:-}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=256M,mode=1777
    ports:
      - "3001:3001"
    networks:
      - internal
      - sandbox-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /var/cache/nginx:size=64M,mode=0755
      - /var/run:size=8M,mode=0755
    ports:
      - "80:80"
    networks:
      - internal
    depends_on:
      - api
    restart: unless-stopped

  # ─── Runner services ─────────────────────────────────────────────────────
  # Single image (runner-service/Dockerfile), different RUNNER_TYPE per deployment.
  # Aligned with devops/docker-compose.swarm.yml:
  #   - cap_drop: ALL with minimal cap_add for per-agent UID isolation
  #   - no-new-privileges, /tmp on tmpfs
  #   - no docker socket mount, no host code bind mount
  #   - per-service named volumes only

  claudecode-service:
    build:
      context: .
      dockerfile: runner-service/Dockerfile
    environment:
      - RUNNER_TYPE=claude-code
      - TZ=${TZ:-Europe/Paris}
      - LOG_LEVEL=info
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - RUNNER_MODEL=${CLAUDE_MODEL:-claude-opus-4-7}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-opus-4-7}
      - RUNNER_MAX_TURNS=${CLAUDE_MAX_TURNS:-50}
      - CLAUDE_MAX_TURNS=${CLAUDE_MAX_TURNS:-50}
      - VERBOSE=${CODER_VERBOSE:-false}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://api:3001
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - MCP_ENDPOINT=${MCP_ENDPOINT:-}
      - PYTHONUNBUFFERED=1
      - PYTHONFAULTHANDLER=1
    volumes:
      # Stateless runner: /app/data is NOT persisted — agent HOMEs, OAuth tokens
      # (hydrated from team-api per owner), MCP/settings and project clones are
      # all re-injected at spawn. A global (no-owner) token must come from the
      # CLAUDE_CODE_OAUTH_TOKEN env. Only the Android SDK cache is kept.
      - claudecode-android-cache:/opt/android-sdk
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    ports:
      - "8000:8000"
    networks:
      - sandbox-net
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  openclaw-service:
    build:
      context: .
      dockerfile: runner-service/Dockerfile
    environment:
      - RUNNER_TYPE=openclaw
      - TZ=${TZ:-Europe/Paris}
      - LOG_LEVEL=info
      - RUNNER_MODEL=${OPENCLAW_MODEL:-claude-opus-4-6}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://api:3001
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - PYTHONUNBUFFERED=1
    # Stateless runner — /app/data re-injected at spawn (see claudecode-service).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    networks:
      - sandbox-net
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  opencode-service:
    build:
      context: .
      dockerfile: runner-service/Dockerfile
      args:
        OPENCODE_CLI_VERSION: ${OPENCODE_CLI_VERSION:-latest}
        OPENCODE_CLI_CACHE_BUST: ${OPENCODE_CLI_CACHE_BUST:-1}
    environment:
      - RUNNER_TYPE=opencode
      - TZ=${TZ:-Europe/Paris}
      - LOG_LEVEL=info
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://api:3001
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - PYTHONUNBUFFERED=1
    # Stateless runner — /app/data re-injected at spawn (see claudecode-service).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    networks:
      - sandbox-net
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  aider-service:
    build:
      context: .
      dockerfile: runner-service/Dockerfile
      args:
        AIDER_CLI_VERSION: ${AIDER_CLI_VERSION:-latest}
        AIDER_CLI_CACHE_BUST: ${AIDER_CLI_CACHE_BUST:-1}
    environment:
      - RUNNER_TYPE=aider
      - TZ=${TZ:-Europe/Paris}
      - LOG_LEVEL=info
      - RUNNER_MODEL=${AIDER_MODEL:-}
      # Fallback provider keys — the per-agent LLM config forwarded via
      # X-LLM-Config takes precedence; aider (litellm) reads these env vars when
      # an agent has no explicit config.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://api:3001
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - PYTHONUNBUFFERED=1
    # Stateless runner — /app/data re-injected at spawn (see claudecode-service).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    networks:
      - sandbox-net
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  codex-service:
    build:
      context: .
      dockerfile: runner-service/Dockerfile
      args:
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-latest}
        CODEX_CLI_CACHE_BUST: ${CODEX_CLI_CACHE_BUST:-1}
    environment:
      - RUNNER_TYPE=codex
      - TZ=${TZ:-Europe/Paris}
      - LOG_LEVEL=info
      # Use the operator's ChatGPT plan: run `docker exec -it <container> codex login`
      # once to seed /root/.codex/auth.json. Per-agent HOME isolation gives every
      # agent its own copy. Falls back to OPENAI_API_KEY when no OAuth token.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - RUNNER_MODEL=${CODEX_MODEL:-}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://api:3001
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - MCP_ENDPOINT=${MCP_ENDPOINT:-}
      - PYTHONUNBUFFERED=1
    # Stateless runner — /app/data re-injected at spawn (see claudecode-service).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    networks:
      - sandbox-net
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  hermes-service:
    build:
      context: .
      dockerfile: runner-service/Dockerfile
    environment:
      - RUNNER_TYPE=hermes
      - TZ=${TZ:-Europe/Paris}
      - LOG_LEVEL=info
      - RUNNER_MODEL=${HERMES_MODEL:-claude-opus-4-8}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://api:3001
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - PYTHONUNBUFFERED=1
    # Stateless runner — /app/data re-injected at spawn (see claudecode-service).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    networks:
      - sandbox-net
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  sandbox-service:
    build:
      context: .
      dockerfile: runner-service/Dockerfile
    environment:
      - RUNNER_TYPE=sandbox
      - TZ=${TZ:-Europe/Paris}
      - LOG_LEVEL=info
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - PYTHONUNBUFFERED=1
    volumes:
      - sandbox-data:/app/data
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    networks:
      - sandbox-net
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  mock-service:
    build:
      context: .
      dockerfile: runner-service/Dockerfile
    environment:
      - RUNNER_TYPE=mock
      - TZ=${TZ:-Europe/Paris}
      - RUNNER_MODEL=mock-llm-1
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - MOCK_DELAY_MS=${MOCK_DELAY_MS:-50}
      - MOCK_FAIL_ON=${MOCK_FAIL_ON:-}
      - MOCK_TIMEOUT_ON=${MOCK_TIMEOUT_ON:-}
      - PYTHONUNBUFFERED=1
    volumes:
      - mock-data:/app/data
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=128M,mode=1777
    ports:
      - "8010:8000"
    networks:
      - sandbox-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  flaresolverr:
    image: 21hsmw/flaresolverr:nodriver
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-Europe/Paris}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=128M,mode=1777
    networks:
      - sandbox-net
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8191/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  mcp-browser:
    build:
      context: .
      dockerfile: mcp-browser/Dockerfile
    environment:
      - TZ=${TZ:-Europe/Paris}
      - NODE_ENV=production
      - LOG_LEVEL=info
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
      - MAX_SEARCH_RESULT=5
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=256M,mode=1777
    networks:
      - sandbox-net
      - backend
    depends_on:
      - flaresolverr
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  pgdata:
  claudecode-android-cache:
  # CLI runner *-data volumes removed — those runners are stateless now
  # (/app/data re-injected at spawn). sandbox/mock keep their data volumes.
  sandbox-data:
  mock-data:

networks:
  internal:
  sandbox-net:
  backend:
