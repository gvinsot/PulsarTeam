services:
  team-api:
    image: registry.methodinfo.fr/pulsarteam-server:latest
    build:
      context: ..
      dockerfile: api/Dockerfile
      target: production
    environment:
      # Vars matching *_SECRET / *_KEY / *_TOKEN / *_PASSWORD are auto-converted
      # to Docker secrets by the deployment system (mounted at /run/secrets/<NAME>).
      # App code reads them via api/src/secrets.ts (file first, env fallback).
      - NODE_ENV=production
      - PORT=${PORT}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in the deployment environment}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in the deployment environment}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - DATABASE_CONNECTION_STRING=${DATABASE_CONNECTION_STRING}
      # APP_ENVIRONMENT pins this replica to a deployment ("prod", "qa", …) so
      # the workflow engine picks up only the tasks tagged with that value
      # when several stacks share the same database. Leave unset to let the
      # API auto-detect from the first public hostname it sees.
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET}
      # Google + Microsoft OAuth — the redirect_uri is auto-derived from each
      # request (host + fixed path), so no *_REDIRECT_URI env var is needed.
      # Register the public URIs in the OAuth client console (Google Cloud /
      # Azure App registration); see .env.example.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      - CLAUDECODE_SERVICE_URL=http://claudecode-service:8000
      - SANDBOX_SERVICE_URL=http://sandbox-service:8000
      - OPENCLAW_SERVICE_URL=http://openclaw-service:8000
      - HERMES_SERVICE_URL=http://hermes-service:8000
      - OPENCODE_SERVICE_URL=http://opencode-service:8000
      - AIDER_SERVICE_URL=http://aider-service:8000
      - CODEX_SERVICE_URL=http://codex-service:8000
      - MCP_ENDPOINT=http://swarm-manager:8000/ai/mcp
      - MCP_ACTIONS_ENDPOINT=http://swarm-manager:8000/ai/actions/mcp
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID:-}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET:-}
      - SLACK_REDIRECT_URI=${SLACK_REDIRECT_URI:-}
      - JIRA_BOARD_URL=${JIRA_BOARD_URL:-}
      - JIRA_ORG_ID=${JIRA_ORG_ID:-}
      - JIRA_API_KEY=${JIRA_API_KEY:-}
      - JIRA_USER_EMAIL=${JIRA_USER_EMAIL:-}
      - JIRA_WEBHOOK_URL=${JIRA_WEBHOOK_URL:-}
      - JIRA_WEBHOOK_SECRET=${JIRA_WEBHOOK_SECRET:-}
      - CODER_API_KEY=${CODER_API_KEY:?CODER_API_KEY must be set in the deployment environment}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - BROWSER_SERVICE_URL=http://mcp-browser:8000
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=256M,mode=1777
    networks:
      proxy:
        aliases:
          - api
      backend:
        aliases:
          - team-api
      postgresqlcluster_internal:
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == server-b
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.pulsarteam-api.loadbalancer.server.port=3001"
        # ─── Shared security headers middleware ─────────────────────────────
        - "traefik.http.middlewares.pulsarteam-sec-headers.headers.stsSeconds=63072000"
        - "traefik.http.middlewares.pulsarteam-sec-headers.headers.stsIncludeSubdomains=true"
        - "traefik.http.middlewares.pulsarteam-sec-headers.headers.stsPreload=true"
        - "traefik.http.middlewares.pulsarteam-sec-headers.headers.forceSTSHeader=true"
        - "traefik.http.middlewares.pulsarteam-sec-headers.headers.frameDeny=true"
        - "traefik.http.middlewares.pulsarteam-sec-headers.headers.contentTypeNosniff=true"
        - "traefik.http.middlewares.pulsarteam-sec-headers.headers.browserXssFilter=true"
        - "traefik.http.middlewares.pulsarteam-sec-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
        - "traefik.http.middlewares.pulsarteam-sec-headers.headers.customResponseHeaders.Permissions-Policy=accelerometer=(),camera=(),geolocation=(),gyroscope=(),magnetometer=(),microphone=(),payment=(),usb=()"
        # same-origin-allow-popups (vs same-origin) preserves the window.opener
        # link when the popup navigates cross-origin and back — required so the
        # Google/Microsoft OAuth popups can postMessage back to the React app
        # with the connection result. Without this, status badges only update
        # after a manual page refresh.
        - "traefik.http.middlewares.pulsarteam-sec-headers.headers.customResponseHeaders.Cross-Origin-Opener-Policy=same-origin-allow-popups"
        - "traefik.http.middlewares.pulsarteam-sec-headers.headers.customResponseHeaders.X-Permitted-Cross-Domain-Policies=none"
        # ─── API routers ─────────────────────────────────────────────────────
        - "traefik.http.routers.pulsarteam-api.rule=(Host(`www.pulsarteam.io`) || Host(`pulsarteam.io`)) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`) || PathPrefix(`/ws`))"
        - "traefik.http.routers.pulsarteam-api.entrypoints=websecure"
        - "traefik.http.routers.pulsarteam-api.tls.certresolver=letsencrypt"
        - "traefik.http.routers.pulsarteam-api.middlewares=realtime-global@file,pulsarteam-sec-headers"
        - "traefik.http.routers.pulsarteam-api.service=pulsarteam-api"
        - "traefik.http.routers.pulsarteam-api.priority=100"
        - "traefik.http.routers.pulsarteam-api-http.rule=(Host(`www.pulsarteam.io`) || Host(`pulsarteam.io`)) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`) || PathPrefix(`/ws`))"
        - "traefik.http.routers.pulsarteam-api-http.entrypoints=web"
        - "traefik.http.routers.pulsarteam-api-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.pulsarteam-api-http.service=noop@internal"
        - "traefik.http.routers.pulsarteam-oauth-cb.rule=(Host(`www.pulsarteam.io`) || Host(`pulsarteam.io`)) && (Path(`/gmail-callback.html`) || Path(`/gdrive-callback.html`) || Path(`/google-callback.html`))"
        - "traefik.http.routers.pulsarteam-oauth-cb.entrypoints=websecure"
        - "traefik.http.routers.pulsarteam-oauth-cb.tls.certresolver=letsencrypt"
        - "traefik.http.routers.pulsarteam-oauth-cb.middlewares=pulsarteam-sec-headers"
        - "traefik.http.routers.pulsarteam-oauth-cb.service=pulsarteam-api"
        - "traefik.http.routers.pulsarteam-oauth-cb.priority=200"
        - "traefik.http.routers.pulsarteam-oauth-cb-http.rule=(Host(`www.pulsarteam.io`) || Host(`pulsarteam.io`)) && (Path(`/gmail-callback.html`) || Path(`/gdrive-callback.html`) || Path(`/google-callback.html`))"
        - "traefik.http.routers.pulsarteam-oauth-cb-http.entrypoints=web"
        - "traefik.http.routers.pulsarteam-oauth-cb-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.pulsarteam-oauth-cb-http.service=noop@internal"

  frontend:
    image: registry.methodinfo.fr/pulsarteam-client:latest
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /var/cache/nginx:size=64M,mode=0755
      - /var/run:size=8M,mode=0755
    networks:
      - proxy
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.pulsarteam-frontend.loadbalancer.server.port=80"
        - "traefik.http.routers.pulsarteam-frontend.rule=Host(`www.pulsarteam.io`) || Host(`pulsarteam.io`)"
        - "traefik.http.routers.pulsarteam-frontend.entrypoints=websecure"
        - "traefik.http.routers.pulsarteam-frontend.tls.certresolver=letsencrypt"
        - "traefik.http.routers.pulsarteam-frontend.middlewares=global@file,pulsarteam-sec-headers@swarm"
        - "traefik.http.routers.pulsarteam-frontend.service=pulsarteam-frontend"
        - "traefik.http.routers.pulsarteam-frontend.priority=1"
        - "traefik.http.routers.pulsarteam-oauth-frontend.rule=(Host(`www.pulsarteam.io`) || Host(`pulsarteam.io`)) && PathPrefix(`/auth/`)"
        - "traefik.http.routers.pulsarteam-oauth-frontend.entrypoints=websecure"
        - "traefik.http.routers.pulsarteam-oauth-frontend.tls.certresolver=letsencrypt"
        - "traefik.http.routers.pulsarteam-oauth-frontend.service=pulsarteam-frontend"
        - "traefik.http.routers.pulsarteam-oauth-frontend.priority=50"
        - "traefik.http.routers.pulsarteam-oauth-frontend-http.rule=(Host(`www.pulsarteam.io`) || Host(`pulsarteam.io`)) && PathPrefix(`/auth/`)"
        - "traefik.http.routers.pulsarteam-oauth-frontend-http.entrypoints=web"
        - "traefik.http.routers.pulsarteam-oauth-frontend-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.pulsarteam-oauth-frontend-http.service=noop@internal"
        - "traefik.http.routers.pulsarteam-frontend-http.rule=Host(`www.pulsarteam.io`) || Host(`pulsarteam.io`)"
        - "traefik.http.routers.pulsarteam-frontend-http.entrypoints=web"
        - "traefik.http.routers.pulsarteam-frontend-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.pulsarteam-frontend-http.service=noop@internal"

  claudecode-service:
    build:
      context: ..
      dockerfile: runner-service/Dockerfile
    image: registry.methodinfo.fr/claudecode-service:latest
    networks:
      backend:
        aliases:
          - claudecode-service
    environment:
      - RUNNER_TYPE=claude-code
      - TZ=Europe/Paris
      - LOG_LEVEL=info
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - RUNNER_MODEL=${CLAUDE_MODEL:-}
      - RUNNER_MAX_TURNS=${CLAUDE_MAX_TURNS:-80}
      - CLAUDE_MAX_TURNS=${CLAUDE_MAX_TURNS:-80}
      - VERBOSE=${CODER_VERBOSE:-false}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:?CODER_API_KEY must be set in the deployment environment}
      - RUNNER_ENV=production
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://team-api:3001
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in the deployment environment}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - MCP_ENDPOINT=${MCP_ENDPOINT:-http://swarm-manager:8000/ai/mcp}
      - PYTHONUNBUFFERED=1
      - PYTHONFAULTHANDLER=1
    volumes:
      # Stateless runner: /app/data (agent HOMEs, tokens, CLI sessions, project
      # clones) is NOT persisted. Everything is re-injected at spawn — OAuth
      # tokens are hydrated from team-api per owner (resolve_token /
      # seed_credentials_file), MCP/settings are rewritten, projects re-cloned.
      # A node move therefore needs no re-auth for owner-scoped agents. A global
      # (no-owner) token, if used, must be supplied via the CLAUDE_CODE_OAUTH_TOKEN
      # secret above. Only the large, owner-agnostic Android SDK cache is kept.
      - claudecode-android-cache:/opt/android-sdk
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  test:
    image: registry.methodinfo.fr/pulsarteam-test:latest
    build:
      context: ..
      dockerfile: api/Dockerfile
      target: test
    volumes: []
    deploy:
      replicas: 0

  sandbox-service:
    image: registry.methodinfo.fr/sandbox-service:latest
    build:
      context: ..
      dockerfile: runner-service/Dockerfile
    networks:
      backend:
        aliases:
          - sandbox-service
    environment:
      - RUNNER_TYPE=sandbox
      - TZ=Europe/Paris
      - LOG_LEVEL=info
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:?CODER_API_KEY must be set in the deployment environment}
      - RUNNER_ENV=production
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - PYTHONUNBUFFERED=1
    volumes:
      - sandbox-data:/app/data
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == server-b
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=false"

  openclaw-service:
    image: registry.methodinfo.fr/openclaw-service:latest
    build:
      context: ..
      dockerfile: runner-service/Dockerfile
    networks:
      backend:
        aliases:
          - openclaw-service
      # Shared overlay to reach local LLM servers (vLLM/Ollama) hosted in a
      # separate stack by their service name. See the llm-net note at the
      # bottom of this file for the one-time `docker network create`.
      llm-net: {}
    environment:
      - RUNNER_TYPE=openclaw
      - TZ=Europe/Paris
      - LOG_LEVEL=info
      - RUNNER_MODEL=${OPENCLAW_MODEL:-claude-opus-4-6}
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:?CODER_API_KEY must be set in the deployment environment}
      - RUNNER_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - PYTHONUNBUFFERED=1
    # Stateless runner — /app/data re-injected at spawn (see claudecode-service).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  opencode-service:
    image: registry.methodinfo.fr/opencode-service:latest
    build:
      context: ..
      dockerfile: runner-service/Dockerfile
      args:
        OPENCODE_CLI_VERSION: ${OPENCODE_CLI_VERSION:-latest}
        OPENCODE_CLI_CACHE_BUST: ${OPENCODE_CLI_CACHE_BUST:-1}
    networks:
      backend:
        aliases:
          - opencode-service
      # Shared overlay to reach local LLM servers (vLLM/Ollama) hosted in a
      # separate stack by their service name. See the llm-net note at the
      # bottom of this file for the one-time `docker network create`.
      llm-net: {}
    environment:
      - RUNNER_TYPE=opencode
      - TZ=Europe/Paris
      - LOG_LEVEL=info
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:?CODER_API_KEY must be set in the deployment environment}
      - RUNNER_ENV=production
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - PYTHONUNBUFFERED=1
    # Stateless runner — /app/data re-injected at spawn (see claudecode-service).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  aider-service:
    image: registry.methodinfo.fr/aider-service:latest
    build:
      context: ..
      dockerfile: runner-service/Dockerfile
      args:
        AIDER_CLI_VERSION: ${AIDER_CLI_VERSION:-latest}
        AIDER_CLI_CACHE_BUST: ${AIDER_CLI_CACHE_BUST:-1}
    networks:
      backend:
        aliases:
          - aider-service
      # Shared overlay to reach local LLM servers (vLLM/Ollama) hosted in a
      # separate stack by their service name. See the llm-net note at the
      # bottom of this file for the one-time `docker network create`.
      llm-net: {}
    environment:
      - RUNNER_TYPE=aider
      - TZ=Europe/Paris
      - LOG_LEVEL=info
      - RUNNER_MODEL=${AIDER_MODEL:-}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:?CODER_API_KEY must be set in the deployment environment}
      - RUNNER_ENV=production
      # Fallback provider keys — the per-agent LLM config forwarded via
      # X-LLM-Config takes precedence; aider (litellm) reads these when an agent
      # has no explicit config.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://team-api:3001
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in the deployment environment}
      - PYTHONUNBUFFERED=1
    # Stateless runner — /app/data re-injected at spawn (see claudecode-service).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  codex-service:
    image: registry.methodinfo.fr/codex-service:latest
    build:
      context: ..
      dockerfile: runner-service/Dockerfile
      args:
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-latest}
        CODEX_CLI_CACHE_BUST: ${CODEX_CLI_CACHE_BUST:-1}
    networks:
      backend:
        aliases:
          - codex-service
    environment:
      - RUNNER_TYPE=codex
      - TZ=Europe/Paris
      - LOG_LEVEL=info
      - RUNNER_MODEL=${CODEX_MODEL:-gpt-5-codex}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:?CODER_API_KEY must be set in the deployment environment}
      - RUNNER_ENV=production
      # Fallback when no OAuth/ChatGPT plan is configured for the owner.
      # OAuth tokens are managed per-owner via team-api (encrypted at rest)
      # and hydrated into the agent's ~/.codex/auth.json at each spawn.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://team-api:3001
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in the deployment environment}
      - PYTHONUNBUFFERED=1
    # Stateless runner — /app/data re-injected at spawn (see claudecode-service).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  hermes-service:
    image: registry.methodinfo.fr/hermes-service:latest
    build:
      context: ..
      dockerfile: runner-service/Dockerfile
    networks:
      backend:
        aliases:
          - hermes-service
      # Shared overlay to reach local LLM servers (vLLM/Ollama) hosted in a
      # separate stack by their service name. See the llm-net note at the
      # bottom of this file for the one-time `docker network create`.
      llm-net: {}
    environment:
      - RUNNER_TYPE=hermes
      - TZ=Europe/Paris
      - LOG_LEVEL=info
      - RUNNER_MODEL=${HERMES_MODEL:-}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - CODER_API_KEY=${CODER_API_KEY:?CODER_API_KEY must be set in the deployment environment}
      - RUNNER_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://team-api:3001
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in the deployment environment}
      - PYTHONUNBUFFERED=1
    # Stateless runner — /app/data re-injected at spawn (see claudecode-service).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  flaresolverr:
    image: 21hsmw/flaresolverr:nodriver
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=128M,mode=1777
    networks:
      backend:
        aliases:
          - flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=UTC
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        delay: 10s
        failure_action: rollback
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8191/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mcp-browser:
    build:
      context: ..
      dockerfile: mcp-browser/Dockerfile
    image: registry.methodinfo.fr/mcp-browser:latest
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=256M,mode=1777
    networks:
      backend:
        aliases:
          - mcp-browser
    environment:
      - TZ=Europe/Paris
      - NODE_ENV=production
      - LOG_LEVEL=info
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
      - MAX_SEARCH_RESULT=5
    depends_on:
      - flaresolverr
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        delay: 10s
        failure_action: rollback
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  claudecode-android-cache:
    driver: local
  # NOTE: the CLI runner *-data volumes were removed — those runners are now
  # stateless (/app/data re-injected at spawn; see claudecode-service). sandbox
  # keeps its own data volume below.
  sandbox-data:
    driver: local

# Note: Docker secrets are NOT declared here.
# The deployment system inspects the `environment:` blocks and, for every var
# matching `*_SECRET`, `*_KEY`, `*_TOKEN`, or `*_PASSWORD`, creates a Docker
# secret and mounts it at /run/secrets/<NAME>. App code reads it directly via
# api/src/secrets.ts (Node) or runner-service/src/secrets.py (Python).

networks:
  proxy:
    external: true
  postgresqlcluster_internal:
    external: true
  backend:
    driver: overlay
    attachable: true
  # External shared overlay for reaching local LLM servers (vLLM/Ollama) that
  # live in a SEPARATE stack, by their service name (e.g. http://vllm-dev-service:8000).
  # Create it once before deploying this stack:
  #   docker network create -d overlay --attachable llm-net
  # then attach the vLLM/Ollama stack's service(s) to the same `llm-net`
  # (networks: { llm-net: { external: true } }). Only the local-model CLI
  # runners (hermes/opencode/openclaw/aider) join it — not claudecode/codex.
  llm-net:
    external: true
