version: '3.8'

services:
  agentswarm-server:
    image: agentswarm-server:latest
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SANDBOX_IMAGE=agentswarm-sandbox:latest
      - SANDBOX_SHARED_CONTAINER_NAME=sandbox-shared
      - SANDBOX_NETWORK=bridge
      - SANDBOX_BASE_WORKSPACE=/workspace
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /projects:/projects
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  agentswarm-client:
    image: agentswarm-client:latest
    ports:
      - "3000:80"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure