    build:
      context: ..
      dockerfile: runner-service/Dockerfile
    networks:
      proxy:
        aliases:
          - opencode-service
    environment:
      - RUNNER_TYPE=opencode
      - TZ=Europe/Paris
      - LOG_LEVEL=info
      - PORT=8000
      - HOST=0.0.0.0
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - PYTHONUNBUFFERED=1
    secrets:
      - source: coder_api_key
        target: API_KEY
      - source: encryption_key
        target: ENCRYPTION_KEY
    volumes:
      - opencode-data:/app/data
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  hermes-service:
    image: registry.methodinfo.fr/hermes-service:latest
    build:
      context: ..
      dockerfile: runner-service/Dockerfile
    networks:
      proxy:
        aliases:
          - hermes-service
    environment:
      - RUNNER_TYPE=hermes
      - TZ=Europe/Paris
      - LOG_LEVEL=info
      - RUNNER_MODEL=${HERMES_MODEL:-claude-opus-4-6}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://team-api:3001
      - PYTHONUNBUFFERED=1
    secrets:
      - source: jwt_secret
        target: JWT_SECRET
      - source: coder_api_key
        target: API_KEY
      - source: anthropic_api_key
        target: ANTHROPIC_API_KEY
      - source: encryption_key
        target: ENCRYPTION_KEY
    volumes:
      - hermes-data:/app/data
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,mode=1777
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  flaresolverr:
    image: 21hsmw/flaresolverr:nodriver
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=128M,mode=1777
    networks:
      proxy:
      backend:
        aliases:
          - flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=UTC
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        delay: 10s
        failure_action: rollback
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8191/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mcp-browser:
    build:
      context: ..
      dockerfile: mcp-browser/Dockerfile
    image: registry.methodinfo.fr/mcp-browser:latest
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=256M,mode=1777
    networks:
      proxy:
        aliases:
          - mcp-browser
      backend:
        aliases:
          - mcp-browser
    environment:
      - TZ=Europe/Paris
      - NODE_ENV=production
      - LOG_LEVEL=info
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
      - MAX_SEARCH_RESULT=5
    depends_on:
      - flaresolverr
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        delay: 10s
        failure_action: rollback
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  claudecode-android-cache:
    driver: local
  claudecode-auth-data:
    driver: local
  sandbox-data:
    driver: local
  openclaw-data:
    driver: local
  opencode-data:
    driver: local
  hermes-data:
    driver: local

# ─── Docker Swarm secrets ───────────────────────────────────────────────────
# All secrets are declared external — they must be created on the swarm
# manager BEFORE deploying the stack. Example:
#   printf '%s' "$JWT_SECRET" | docker secret create jwt_secret -
#   openssl rand -base64 32 | docker secret create encryption_key -
#
# To rotate a secret:
#   docker secret create jwt_secret_v2 -    # create new version
#   # update the swarm.yml to reference jwt_secret_v2
#   docker stack deploy -c devops/docker-compose.swarm.yml pulsarteam
#   docker secret rm jwt_secret             # remove old version
secrets:
  jwt_secret:
    external: true
  admin_password:
    external: true
  anthropic_api_key:
    external: true
