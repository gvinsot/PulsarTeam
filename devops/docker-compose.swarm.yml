services:
  team-api:
    image: registry.methodinfo.fr/pulsarteam-server:latest
    build:
      context: ..
      dockerfile: api/Dockerfile
      target: production
    environment:
      - NODE_ENV=production
      - PORT=${PORT}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - DATABASE_URL=${DATABASE_URL}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - CLAUDECODE_SERVICE_URL=http://claudecode-service:8000
      - SANDBOX_SERVICE_URL=http://sandbox-service:8000
      - OPENCLAW_SERVICE_URL=http://openclaw-service:8000
      - HERMES_SERVICE_URL=http://hermes-service:8000
      - OPENCODE_SERVICE_URL=http://opencode-service:8000
      - SSH_KEYS_HOST_PATH=${SSH_KEYS_HOST_PATH}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USER=${GITHUB_USER}
      - MCP_ENDPOINT=http://swarm-manager:8000/ai/mcp
      - MCP_ACTIONS_ENDPOINT=http://swarm-manager:8000/ai/actions/mcp
      - ONEDRIVE_CLIENT_ID=${ONEDRIVE_CLIENT_ID}
      - ONEDRIVE_CLIENT_SECRET=${ONEDRIVE_CLIENT_SECRET}
      - ONEDRIVE_REDIRECT_URI=${ONEDRIVE_REDIRECT_URI}
      - ONEDRIVE_TENANT_ID=${ONEDRIVE_TENANT_ID}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID:-}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET:-}
      - GMAIL_REDIRECT_URI=${GMAIL_REDIRECT_URI:-}
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID:-}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET:-}
      - SLACK_REDIRECT_URI=${SLACK_REDIRECT_URI:-}
      - JIRA_BOARD_URL=${JIRA_BOARD_URL:-}
      - JIRA_ORG_ID=${JIRA_ORG_ID:-}
      - JIRA_API_KEY=${JIRA_API_KEY:-}
      - JIRA_USER_EMAIL=${JIRA_USER_EMAIL:-}
      - JIRA_WEBHOOK_URL=${JIRA_WEBHOOK_URL:-}
      - JIRA_WEBHOOK_SECRET=${JIRA_WEBHOOK_SECRET:-}
      - CODER_API_KEY=${CODER_API_KEY:-change-me-in-production}
      - CLAUDECODE_SERVICE_URL=http://claudecode-service:8000
      - OPENCLAW_SERVICE_URL=http://openclaw-service:8000
      - OPENCODE_SERVICE_URL=http://opencode-service:8000
      - BROWSER_SERVICE_URL=http://mcp-browser:8000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SSH_KEYS_HOST_PATH:-/tmp/empty-ssh}:/root/.ssh:ro
    networks:
      proxy:
        aliases:
          - api
      postgresqlcluster_internal:
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == server-b
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.pulsarteam-api.loadbalancer.server.port=3001"
        - "traefik.http.routers.pulsarteam-api.rule=(Host(`www.pulsarteam.io`) || Host(`pulsarteam.io`)) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`))"
        - "traefik.http.routers.pulsarteam-api.entrypoints=websecure"
        - "traefik.http.routers.pulsarteam-api.tls.certresolver=letsencrypt"
        - "traefik.http.routers.pulsarteam-api.middlewares=realtime-global@file"
        - "traefik.http.routers.pulsarteam-api.service=pulsarteam-api"
        - "traefik.http.routers.pulsarteam-api.priority=100"
        - "traefik.http.routers.pulsarteam-api-http.rule=(Host(`www.pulsarteam.io`) || Host(`pulsarteam.io`)) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`))"
        - "traefik.http.routers.pulsarteam-api-http.entrypoints=web"
        - "traefik.http.routers.pulsarteam-api-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.pulsarteam-api-http.service=noop@internal"

  frontend:
    image: registry.methodinfo.fr/pulsarteam-client:latest
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    networks:
      - proxy
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.pulsarteam-frontend.loadbalancer.server.port=80"
        - "traefik.http.routers.pulsarteam-frontend.rule=Host(`www.pulsarteam.io`) || Host(`pulsarteam.io`)"
        - "traefik.http.routers.pulsarteam-frontend.entrypoints=websecure"
        - "traefik.http.routers.pulsarteam-frontend.tls.certresolver=letsencrypt"
        - "traefik.http.routers.pulsarteam-frontend.middlewares=global@file"
        - "traefik.http.routers.pulsarteam-frontend.service=pulsarteam-frontend"
        - "traefik.http.routers.pulsarteam-frontend.priority=1"
        - "traefik.http.routers.pulsarteam-frontend-http.rule=Host(`www.pulsarteam.io`) || Host(`pulsarteam.io`)"
        - "traefik.http.routers.pulsarteam-frontend-http.entrypoints=web"
        - "traefik.http.routers.pulsarteam-frontend-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.pulsarteam-frontend-http.service=noop@internal"

  claudecode-service:
    build:
      context: ..
      dockerfile: runner-service/Dockerfile
    image: registry.methodinfo.fr/claudecode-service:latest
    networks:
      proxy:
        aliases:
          - claudecode-service
    environment:
      - RUNNER_TYPE=claude-code
      - TZ=Europe/Paris
      - LOG_LEVEL=info
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - RUNNER_MODEL=${CLAUDE_MODEL:-claude-opus-4-6}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-opus-4-6}
      - RUNNER_MAX_TURNS=${CLAUDE_MAX_TURNS:-50}
      - CLAUDE_MAX_TURNS=${CLAUDE_MAX_TURNS:-50}
      - VERBOSE=${CODER_VERBOSE:-false}
      - TIMEOUT=600
      - PORT=8000
      - HOST=0.0.0.0
      - API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - SWARM_API_BASE_URL=http://team-api:3001
      - JWT_SECRET=${JWT_SECRET}
      - MCP_ENDPOINT=${MCP_ENDPOINT:-http://swarm-manager:8000/ai/mcp}
      - PYTHONUNBUFFERED=1
      - PYTHONFAULTHANDLER=1
    volumes:
      - /home/gildas/.ssh:/root/.ssh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - claudecode-auth-data:/app/data
      - claudecode-android-cache:/opt/android-sdk
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == server-b
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  test:
    image: registry.methodinfo.fr/pulsarteam-test:latest
    build:
      context: ..
      dockerfile: api/Dockerfile
      target: test
    volumes: []
    deploy:
      replicas: 0

  sandbox-service:
    image: registry.methodinfo.fr/sandbox-service:latest
    build:
      context: ..
      dockerfile: runner-service/Dockerfile
    networks:
      proxy:
        aliases:
          - sandbox-service
    environment:
      - RUNNER_TYPE=sandbox
      - TZ=Europe/Paris
      - LOG_LEVEL=info
      - PORT=8000
      - HOST=0.0.0.0
      - API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - PYTHONUNBUFFERED=1
    volumes:
      - /home/gildas/.ssh:/root/.ssh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox-data:/app/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == server-b
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=false"

  openclaw-service:
    image: registry.methodinfo.fr/openclaw-service:latest
    build:
      context: ..
      dockerfile: runner-service/Dockerfile
    networks:
      proxy:
        aliases:
          - openclaw-service
    environment:
      - RUNNER_TYPE=openclaw
      - TZ=Europe/Paris
      - LOG_LEVEL=info
      - RUNNER_MODEL=${OPENCLAW_MODEL:-claude-opus-4-6}
      - PORT=8000
      - HOST=0.0.0.0
      - API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - PYTHONUNBUFFERED=1
    volumes:
      - /home/gildas/.ssh:/root/.ssh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - openclaw-data:/app/data
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.hostname == server-b
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  opencode-service:
    image: registry.methodinfo.fr/opencode-service:latest
    build:
      context: ..
      dockerfile: opencode-service/Dockerfile
    networks:
      proxy:
        aliases:
          - opencode-service
    environment:
      - TZ=Europe/Paris
      - LOG_LEVEL=info
      - PORT=8000
      - HOST=0.0.0.0
      - API_KEY=${CODER_API_KEY:-change-me-in-production}
      - PUID=${CODER_PUID:-1000}
      - PGID=${CODER_PGID:-1000}
      - PYTHONUNBUFFERED=1
    volumes:
      - /home/gildas/.ssh:/root/.ssh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - opencode-data:/app/data
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.hostname == server-b
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  flaresolverr:
    image: 21hsmw/flaresolverr:nodriver
    networks:
      proxy:
      backend:
        aliases:
          - flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=UTC
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        delay: 10s
        failure_action: rollback
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8191/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mcp-browser:
    build:
      context: ..
      dockerfile: mcp-browser/Dockerfile
    image: registry.methodinfo.fr/mcp-browser:latest
    networks:
      proxy:
        aliases:
          - mcp-browser
      backend:
        aliases:
          - mcp-browser
    environment:
      - TZ=Europe/Paris
      - NODE_ENV=production
      - LOG_LEVEL=info
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
      - MAX_SEARCH_RESULT=5
    depends_on:
      - flaresolverr
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == none
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        delay: 10s
        failure_action: rollback
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  claudecode-android-cache:
    driver: local
  claudecode-auth-data:
    driver: local
  sandbox-data:
    driver: local
  openclaw-data:
    driver: local
  opencode-data:
    driver: local

networks:
  proxy:
    external: true
  postgresqlcluster_internal:
    external: true
  backend:
    driver: overlay
    attachable: true