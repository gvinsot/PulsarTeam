version: '3.8'

services:
  api:
    image: registry.music-ml.com/pulsarteam-api:${VERSION:-latest}
    build:
      context: ../api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - VERSION=${VERSION:-latest}
    volumes:
      - agent-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.pulsarteam-api.rule=Host(`swarm.music-ml.com`) && PathPrefix(`/api`, `/socket.io`)"
        - "traefik.http.routers.pulsarteam-api.entrypoints=websecure"
        - "traefik.http.routers.pulsarteam-api.tls.certresolver=letsencrypt"
        - "traefik.http.services.pulsarteam-api.loadbalancer.server.port=3001"
        - "traefik.docker.network=traefik-public"

  frontend:
    image: registry.music-ml.com/pulsarteam-frontend:${VERSION:-latest}
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - VITE_APP_VERSION=${VERSION:-dev}
    ports:
      - "5173:80"
    networks:
      - app-network
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.pulsarteam-frontend.rule=Host(`swarm.music-ml.com`) && !PathPrefix(`/api`, `/socket.io`)"
        - "traefik.http.routers.pulsarteam-frontend.entrypoints=websecure"
        - "traefik.http.routers.pulsarteam-frontend.tls.certresolver=letsencrypt"
        - "traefik.http.services.pulsarteam-frontend.loadbalancer.server.port=80"
        - "traefik.docker.network=traefik-public"

  coder-service-1:
    image: registry.music-ml.com/pulsarteam-coder-service-1:${VERSION:-latest}
    build:
      context: ../coder-service
      dockerfile: Dockerfile
    ports:
      - "8111:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CODER_INSTANCE_ID=1
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  coder-service-2:
    image: registry.music-ml.com/pulsarteam-coder-service-2:${VERSION:-latest}
    build:
      context: ../coder-service
      dockerfile: Dockerfile
    ports:
      - "8112:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CODER_INSTANCE_ID=2
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  coder-service-3:
    image: registry.music-ml.com/pulsarteam-coder-service-3:${VERSION:-latest}
    build:
      context: ../coder-service
      dockerfile: Dockerfile
    ports:
      - "8113:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CODER_INSTANCE_ID=3
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  app-network:
    driver: overlay
  traefik-public:
    external: true

volumes:
  agent-data: